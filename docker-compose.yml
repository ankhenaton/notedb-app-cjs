
services:
  backend:
    build: ./backend
    environment:
      - PORT=4000
      - JWT_SECRET=change-me
      - CLIENT_ORIGIN=http://localhost:5173
      - NODE_ENV=development
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/prisma:/app/prisma
    ports:
      - "4000:4000"
    restart: unless-stopped
  frontend:
    build: ./frontend
    environment:
      - VITE_API_BASE=http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
